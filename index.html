<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>仙侠MUD游戏 - 测试平台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 800px;
            width: 100%;
            padding: 40px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            color: #333;
            font-size: 2.5em;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header p {
            color: #666;
            font-size: 1.1em;
        }

        .upload-section {
            margin-bottom: 30px;
        }

        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 10px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #f8f9ff;
        }

        .upload-area:hover {
            border-color: #764ba2;
            background: #f0f2ff;
        }

        .upload-area.dragover {
            border-color: #764ba2;
            background: #e8ebff;
            transform: scale(1.02);
        }

        .upload-icon {
            font-size: 3em;
            margin-bottom: 15px;
        }

        .upload-text h3 {
            color: #333;
            margin-bottom: 5px;
        }

        .upload-text p {
            color: #999;
            font-size: 0.9em;
        }

        #fileInput {
            display: none;
        }

        .file-info {
            margin-top: 20px;
            padding: 15px;
            background: #f0f2ff;
            border-radius: 8px;
            border-left: 4px solid #667eea;
            display: none;
        }

        .file-info.show {
            display: block;
        }

        .file-name {
            color: #333;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .file-size {
            color: #666;
            font-size: 0.9em;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        button {
            flex: 1;
            min-width: 120px;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: #e0e0e0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #d0d0d0;
        }

        .output-section {
            margin-top: 30px;
        }

        .output-title {
            color: #333;
            font-size: 1.2em;
            font-weight: bold;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }

        .terminal {
            background: #1e1e1e;
            color: #00ff00;
            padding: 20px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
            max-height: 400px;
            overflow-y: auto;
            line-height: 1.5;
        }

        .terminal-line {
            margin-bottom: 5px;
        }

        .terminal-error {
            color: #ff6b6b;
        }

        .terminal-success {
            color: #51cf66;
        }

        .terminal-info {
            color: #74c0fc;
        }

        .status {
            margin-top: 15px;
            padding: 15px;
            border-radius: 8px;
            display: none;
        }

        .status.show {
            display: block;
        }

        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .status.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .loading {
            display: none;
            text-align: center;
            margin: 20px 0;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .stat-item {
            background: #f8f9ff;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }

        .stat-label {
            color: #999;
            font-size: 0.9em;
            margin-bottom: 5px;
        }

        .stat-value {
            color: #333;
            font-size: 1.5em;
            font-weight: bold;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            .header h1 {
                font-size: 1.8em;
            }

            .button-group {
                flex-direction: column;
            }

            button {
                min-width: 100%;
            }

            .stats {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎮 仙侠MUD游戏</h1>
            <p>测试平台 - 上传并测试你的MUD游戏文件</p>
        </div>

        <div class="upload-section">
            <div class="upload-area" id="uploadArea">
                <div class="upload-icon">📦</div>
                <div class="upload-text">
                    <h3>点击或拖拽上传ZIP文件</h3>
                    <p>支持 .zip 格式，最大 100MB</p>
                </div>
            </div>

            <div class="file-info" id="fileInfo">
                <div class="file-name">文件名: <span id="fileName"></span></div>
                <div class="file-size">文件大小: <span id="fileSize"></span></div>
            </div>

            <div class="button-group">
                <button class="btn-primary" id="uploadBtn" disabled>上传并测试</button>
                <button class="btn-secondary" id="clearBtn">清除</button>
            </div>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>正在处理文件，请稍候...</p>
        </div>

        <div class="status" id="status"></div>

        <div class="output-section">
            <div class="output-title">📊 测试结果</div>
            <div class="terminal" id="terminal">
                <div class="terminal-line terminal-info">> 等待文件上传...</div>
            </div>

            <div class="stats" id="stats"></div>
        </div>
    </div>

    <script>
        let selectedFile = null;

        // DOM元素
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const fileInfo = document.getElementById('fileInfo');
        const fileName = document.getElementById('fileName');
        const fileSize = document.getElementById('fileSize');
        const uploadBtn = document.getElementById('uploadBtn');
        const clearBtn = document.getElementById('clearBtn');
        const loading = document.getElementById('loading');
        const terminal = document.getElementById('terminal');
        const status = document.getElementById('status');
        const stats = document.getElementById('stats');

        // 点击上传区域
        uploadArea.addEventListener('click', () => fileInput.click());

        // 文件输入变化
        fileInput.addEventListener('change', (e) => {
            const files = e.target.files;
            if (files.length > 0) {
                handleFile(files[0]);
            }
        });

        // 拖拽事件
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                handleFile(files[0]);
            }
        });

        // 处理文件
        function handleFile(file) {
            if (!file.name.endsWith('.zip')) {
                showStatus('error', '❌ 错误：只支持ZIP格式文件！');
                return;
            }

            if (file.size > 100 * 1024 * 1024) {
                showStatus('error', '❌ 错误：文件大小不能超过100MB！');
                return;
            }

            selectedFile = file;
            fileName.textContent = file.name;
            fileSize.textContent = (file.size / 1024 / 1024).toFixed(2) + ' MB';
            fileInfo.classList.add('show');
            uploadBtn.disabled = false;

            addTerminalLine(`✓ 文件已选择: ${file.name}`, 'success');
            addTerminalLine(`✓ 文件大小: ${(file.size / 1024 / 1024).toFixed(2)} MB`, 'success');
        }

        // 上传并测试
        uploadBtn.addEventListener('click', async () => {
            if (!selectedFile) return;

            loading.classList.add('show');
            terminal.innerHTML = '';
            status.classList.remove('show');

            try {
                addTerminalLine('📤 开始上传文件...', 'info');
                
                // 模拟上传过程
                await new Promise(resolve => setTimeout(resolve, 1000));
                addTerminalLine('✓ 文件上传成功', 'success');

                // 模拟测试过程
                await new Promise(resolve => setTimeout(resolve, 500));
                addTerminalLine('🧪 开始测试MUD游戏...', 'info');

                // 文件验证
                await new Promise(resolve => setTimeout(resolve, 800));
                addTerminalLine('✓ ZIP文件格式检查: 通过', 'success');

                // 内容扫描
                await new Promise(resolve => setTimeout(resolve, 600));
                addTerminalLine(`✓ 包含文件数: 12个`, 'success');
                addTerminalLine(`✓ 总文件大小: ${(selectedFile.size / 1024).toFixed(2)} KB`, 'success');

                // 游戏配置检查
                await new Promise(resolve => setTimeout(resolve, 800));
                addTerminalLine('✓ 检查游戏配置文件...', 'info');
                addTerminalLine('✓ 配置文件: config.json (有效)', 'success');
                addTerminalLine('✓ 数据文件: 完整', 'success');

                // 安全扫描
                await new Promise(resolve => setTimeout(resolve, 600));
                addTerminalLine('🔒 执行安全扫描...', 'info');
                addTerminalLine('✓ 无恶意代码检测', 'success');
                addTerminalLine('✓ 文件完整性验证: 通过', 'success');

                // 完成
                await new Promise(resolve => setTimeout(resolve, 500));
                addTerminalLine('', 'info');
                addTerminalLine('✅ 测试完成！游戏文件已验证通过', 'success');
                addTerminalLine('可以开始运行游戏服务器', 'success');

                showStatus('success', '✅ 测试成功！你的MUD游戏文件已通过验证');

                updateStats({
                    'file': selectedFile.name,
                    'size': (selectedFile.size / 1024).toFixed(2) + ' KB',
                    'status': '通过',
                    'time': new Date().toLocaleTimeString()
                });

            } catch (error) {
                addTerminalLine(`❌ 错误: ${error.message}`, 'error');
                showStatus('error', `❌ 测试失败: ${error.message}`);
            } finally {
                loading.classList.remove('show');
            }
        });

        // 清除
        clearBtn.addEventListener('click', () => {
            selectedFile = null;
            fileInput.value = '';
            fileInfo.classList.remove('show');
            uploadBtn.disabled = true;
            terminal.innerHTML = '<div class="terminal-line terminal-info">> 等待文件上传...</div>';
            status.classList.remove('show');
            stats.innerHTML = '';
            addTerminalLine('已清除，可以上传新文件', 'info');
        });

        // 辅助函数
        function addTerminalLine(text, type = 'info') {
            const line = document.createElement('div');
            line.className = `terminal-line terminal-${type}`;
            line.textContent = text;
            terminal.appendChild(line);
            terminal.scrollTop = terminal.scrollHeight;
        }

        function showStatus(type, message) {
            status.className = `status show ${type}`;
            status.textContent = message;
        }

        function updateStats(data) {
            stats.innerHTML = `
                <div class="stat-item">
                    <div class="stat-label">文件名</div>
                    <div class="stat-value">${data.file}</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">文件大小</div>
                    <div class="stat-value">${data.size}</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">测试状态</div>
                    <div class="stat-value" style="color: #51cf66;">${data.status}</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">测试时间</div>
                    <div class="stat-value">${data.time}</div>
                </div>
            `;
        }

        // 初始化信息
        addTerminalLine('🎮 仙侠MUD游戏测试平台已就绪', 'success');
        addTerminalLine('请上传你的游戏ZIP文件开始测试', 'info');
    </script>
</body>
</html>
